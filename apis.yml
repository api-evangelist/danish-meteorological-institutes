  description: The DMI Open Data API provides access to four core public services - meteorological observations (metObs),
    climate data (climateData), ocean observations (oceanObs), and lightning data (lightningData) - via OGC API compatible
    feature collections. Each service requires a per-service API key obtained through the DMI Open Data portal.
