    description: >-
      The Danish Meteorological Institute (DMI) is a government agency in Denmark
      responsible for providing weather forecasts, warnings, and climate information
      to the public and various industries. DMI collects data from weather stations,
      satellites, and other sources to create accurate and reliable weather predictions.
      In addition to forecasting the weather, DMI also conducts research on climate
      change and its impacts on the environment.
