description: >-
  The Danish Meteorological Institute is a government agency responsible for providing
  meteorological and climate services in Denmark. Their main mission is to gather,
  analyze, and disseminate data and information about the weather, climate, and related
  environmental issues. They operate a network of weather stations, radar systems,
  and satellites to monitor and forecast weather conditions in Denmark and the surrounding
  areas.
