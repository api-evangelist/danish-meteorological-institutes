description: The Danish Meteorological Institute is a government agency responsible for providing meteorological and climate
  services in Denmark. DMI publishes weather observations, climate data, ocean observations, and lightning data through its
  Open Data API and supplies forecast products via the AWS Open Data registry. The agency operates weather stations, radar
  systems, and satellites to monitor and forecast weather across Denmark, Greenland, and the Faroe Islands.
