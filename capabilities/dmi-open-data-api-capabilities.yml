name: DMI Open Data API Capabilities
description: >-
  Capabilities exposed by the Danish Meteorological Institute Open Data API
  across its meteorological, climate, ocean, and lightning data services.
capabilities:
  - name: List Meteorological Observations
    description: Query raw weather observations from DMI stations.
    operationId: listMetObservations
    method: GET
    path: /metObs/collections/observation/items
  - name: List Meteorological Stations
    description: Browse DMI weather stations with metadata.
    operationId: listMetStations
    method: GET
    path: /metObs/collections/station/items
  - name: List Climate Station Values
    description: Retrieve quality-checked climate values at hourly to yearly resolutions.
    operationId: listClimateStationValues
    method: GET
    path: /climateData/collections/stationValue/items
  - name: List Ocean Observations
    description: Query sea-level and water-temperature observations.
    operationId: listOceanObservations
    method: GET
    path: /oceanObs/collections/observation/items
  - name: List Lightning Observations
    description: Retrieve lightning-strike events with timing and geometry.
    operationId: listLightningObservations
    method: GET
    path: /lightningdata/collections/observation/items
use_cases:
  - name: Renewable energy forecasting
    description: >-
      Combine wind, temperature, and radiation observations to inform wind and
      solar generation models.
  - name: Climate research
    description: >-
      Use long-term, quality-checked station, grid, municipality, and country
      level climate data series for trend analysis.
  - name: Marine and coastal operations
    description: >-
      Use ocean observations for harbour management, coastal flooding, and
      shipping safety decision support.
  - name: Agriculture and water management
    description: >-
      Drive irrigation and crop models with high-resolution precipitation,
      humidity, and temperature observations.
  - name: Lightning-impact monitoring
    description: >-
      Track lightning activity for utilities, insurance, and outdoor event
      safety operations.
