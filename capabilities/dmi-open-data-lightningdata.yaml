naftiko: 1.0.0-alpha2
info:
  label: DMI Open Data API — lightningData
  description: 'DMI Open Data API — lightningData. 1 operations. Lead operation: List lightning observations. Self-contained
    Naftiko capability covering one Danish Meteorological Institutes business surface.'
  tags:
  - Danish Meteorological Institutes
  - lightningData
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DANISH_METEOROLOGICAL_INSTITUTES_API_KEY: DANISH_METEOROLOGICAL_INSTITUTES_API_KEY
capability:
  consumes:
  - type: http
    namespace: dmi-open-data-lightningdata
    baseUri: https://opendataapi.dmi.dk/v2
    description: DMI Open Data API — lightningData business capability. Self-contained, no shared references.
    resources:
    - name: lightningdata-collections-observation-items
      path: /lightningdata/collections/observation/items
      operations:
      - name: listlightningobservations
        method: GET
        description: List lightning observations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datetime
          in: query
          type: string
        - name: bbox
          in: query
          type: string
    authentication:
      type: apikey
      key: api-key
      value: '{{env.DANISH_METEOROLOGICAL_INSTITUTES_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: dmi-open-data-lightningdata-rest
    port: 8080
    description: REST adapter for DMI Open Data API — lightningData. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lightningdata/collections/observation/items
      name: lightningdata-collections-observation-items
      description: REST surface for lightningdata-collections-observation-items.
      operations:
      - method: GET
        name: listlightningobservations
        description: List lightning observations
        call: dmi-open-data-lightningdata.listlightningobservations
        with:
          datetime: rest.datetime
          bbox: rest.bbox
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dmi-open-data-lightningdata-mcp
    port: 9090
    transport: http
    description: MCP adapter for DMI Open Data API — lightningData. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-lightning-observations
      description: List lightning observations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dmi-open-data-lightningdata.listlightningobservations
      with:
        datetime: tools.datetime
        bbox: tools.bbox
      outputParameters:
      - type: object
        mapping: $.
